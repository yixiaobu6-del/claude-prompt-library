<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 提示词生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
        <!-- Header -->
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-gray-800">Claude 提示词生成器</h1>
            <p class="text-gray-500 mt-2">选择场景和模板，填写参数，一键生成高质量的 Claude 提示词</p>
        </header>

        <!-- Actions -->
        <div class="flex justify-between items-center mb-4">
            <button onclick="randomTemplate()" class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition text-sm">
                <i class="fa fa-random"></i> 随机模板
            </button>
            <span id="status" class="text-sm text-gray-400"></span>
        </div>

        <!-- Main Layout: Left + Right -->
        <div class="grid md:grid-cols-5 gap-4">
            <!-- Left Panel (3 columns) -->
            <div class="md:col-span-3 space-y-4">
                <!-- Category Selector -->
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fa fa-folder-o text-blue-500"></i> 选择场景分类
                    </label>
                    <div id="categories" class="flex gap-2 flex-wrap"></div>
                </div>

                <!-- Template Selector -->
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fa fa-file-text-o text-green-500"></i> 选择模板
                    </label>
                    <div id="templates" class="flex gap-2 flex-wrap"></div>
                </div>

                <!-- Sub-template Selector -->
                <div class="bg-white p-4 rounded-lg shadow-sm border" id="variantSection" style="display:none;">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fa fa-caret-square-o-down text-yellow-500"></i> 选择具体场景
                    </label>
                    <div id="variants" class="flex gap-2 flex-wrap"></div>
                </div>

                <!-- Variable Input Fields -->
                <div id="fieldsSection" class="bg-white p-4 rounded-lg shadow-sm border" style="display:none;">
                    <label class="block text-sm font-medium text-gray-700 mb-3">
                        <i class="fa fa-sliders text-orange-500"></i> 填写参数
                    </label>
                    <div id="fields" class="space-y-3"></div>
                    <button onclick="generate()" class="mt-4 w-full bg-blue-500 text-white py-2.5 rounded-lg font-bold hover:bg-blue-600 transition">
                        <i class="fa fa-magic"></i> 生成提示词
                    </button>
                </div>
            </div>

            <!-- Right Panel (2 columns) -->
            <div class="md:col-span-2">
                <div class="bg-white p-4 rounded-lg shadow-sm border sticky top-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-700">
                            <i class="fa fa-terminal text-indigo-500"></i> 生成的提示词
                        </label>
                        <div class="flex gap-2">
                            <button onclick="copyPrompt()" class="text-sm bg-gray-100 px-3 py-1.5 rounded hover:bg-gray-200 transition" id="copyBtn">
                                <i class="fa fa-copy"></i> 复制
                            </button>
                            <button onclick="saveCurrentToFavorites()" class="text-sm bg-amber-100 px-3 py-1.5 rounded hover:bg-amber-200 transition" title="收藏当前模板配置">
                                <i class="fa fa-star"></i> 收藏
                            </button>
                            <button onclick="clearPrompt()" class="text-sm bg-gray-100 px-3 py-1.5 rounded hover:bg-gray-200 transition">
                                <i class="fa fa-trash-o"></i> 清空
                            </button>
                        </div>
                    </div>
                    <pre id="output" class="bg-gray-900 text-gray-100 p-4 rounded-lg text-sm overflow-auto whitespace-pre-wrap font-mono min-h-[400px] max-h-[600px] border select-all">等待生成...</pre>
                </div>
            </div>
        </div>

        <!-- Footer Tips -->
        <div class="mt-6 p-4 bg-blue-50 rounded-lg">
            <h3 class="font-bold text-blue-800"><i class="fa fa-lightbulb-o"></i> 使用技巧</h3>
            <ul class="mt-2 text-sm text-blue-700 space-y-1">
                <li>先选择场景分类，再选择模板和具体场景</li>
                <li>红色标记为必填字段，请尽量填写完整</li>
                <li>点击「随机模板」可快速体验不同场景</li>
                <li>生成后点击「复制」可直接粘贴到 Claude 中使用</li>
                <li>点击「收藏」保存常用模板，从收藏列表一键加载</li>
                <li>模板基于 <strong>Claude 提示词模板库</strong>，覆盖写作、编程、分析、角色扮演四大场景</li>
            </ul>
        </div>

        <!-- 收藏模板列表 -->
        <div class="mt-6 bg-white p-4 rounded-lg shadow-sm border">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-700"><i class="fa fa-star text-amber-500 mr-1"></i> 收藏模板</h3>
                <button onclick="clearAllFavorites()" class="text-sm text-gray-400 hover:text-red-500"><i class="fa fa-trash-o mr-1"></i>清空</button>
            </div>
            <div id="favoritesList" class="space-y-2 min-h-[40px]">
                <div class="text-gray-400 text-sm text-center py-2">暂无收藏，生成后点击「收藏」保存常用模板</div>
            </div>
        </div>
    </div>

    <script>
    // ============================
    // 模板数据
    // ============================
    const data = {
        "写作场景": {
            icon: "fa-pencil-square-o",
            color: "blue",
            templates: {
                "文章写作": {
                    color: "blue",
                    variants: ["文章框架生成", "引言生成", "案例描写", "结尾升华"],
                    fields: [
                        { key: "theme", label: "文章主题", placeholder: "如：AI对内容创作的影响", required: true },
                        { key: "audience", label: "目标读者", placeholder: "如：内容创业者、自媒体人", required: true },
                        { key: "article_type", label: "文章类型", placeholder: "如：教程/观点/案例分析", required: false },
                        { key: "length", label: "预计长度（字数）", placeholder: "如：2000-3000字", required: false },
                        { key: "key_points", label: "核心观点/要点", placeholder: "如：AI是工具而非替代者", required: false },
                        { key: "intro_style", label: "引入方式", placeholder: "如：故事/数据/提问", required: false },
                        { key: "case_background", label: "案例背景", placeholder: "描述案例背景", required: false },
                        { key: "conflict", label: "核心冲突", placeholder: "关键问题或矛盾", required: false },
                        { key: "ending_type", label: "结尾类型", placeholder: "如：总结/呼吁/反思", required: false }
                    ],
                    prompts: {
                        "文章框架生成": "请帮我设计文章框架：\n- 主题：{{theme}}\n- 目标读者：{{audience}}\n- 文章类型：{{article_type}}\n- 预计长度：{{length}}\n\n要求：\n1. 列出章节结构\n2. 每章核心观点\n3. 每章预计字数\n4. 突出核心要点：{{key_points}}",
                        "引言生成": "请生成文章引言：\n- 主题：{{theme}}\n- 目标读者：{{audience}}\n- 核心观点：{{key_points}}\n- 引入方式：{{intro_style}}\n- 长度：200-500字",
                        "案例描写": "请扩展以下案例：\n- 案例背景：{{case_background}}\n- 目标读者：{{audience}}\n- 核心冲突：{{conflict}}\n- 解决过程：{{key_points}}\n- 最终结果：{{length}}\n\n要求：\n1. 增加细节描写\n2. 加入对话\n3. 突出转折点",
                        "结尾升华": "请生成文章结尾：\n- 文章主题：{{theme}}\n- 目标读者：{{audience}}\n- 核心观点：{{key_points}}\n- 结尾类型：{{ending_type}}\n- 预计长度：{{length}}\n\n要求：\n1. 回扣主题\n2. 提供行动建议\n3. 留有余味"
                    }
                },
                "内容策划": {
                    color: "indigo",
                    variants: ["选题脑暴", "内容日历规划", "用户痛点调研"],
                    fields: [
                        { key: "field", label: "领域/行业", placeholder: "如：职场成长、科技资讯", required: true },
                        { key: "audience", label: "目标读者/用户画像", placeholder: "如：25-35岁职场人", required: true },
                        { key: "content_format", label: "内容形式", placeholder: "如：图文/视频/播客", required: false },
                        { key: "focus", label: "本期重点/核心方向", placeholder: "如：AI工具测评", required: true },
                        { key: "platform", label: "发布平台", placeholder: "如：公众号/小红书/抖音", required: false },
                        { key: "frequency", label: "发布频率", placeholder: "如：每日更新/每周3次", required: false },
                        { key: "hot_topic", label: "热点/专题方向", placeholder: "如：ChatGPT新功能", required: false },
                        { key: "existing_product", label: "已有产品/服务", placeholder: "如：职场技能课程", required: false }
                    ],
                    prompts: {
                        "选题脑暴": "请帮我做选题脑暴：\n- 领域：{{field}}\n- 目标读者：{{audience}}\n- 内容形式：{{content_format}}\n- 本期重点：{{focus}}\n\n请输出：\n1. 10个选题方向（标题形式）\n2. 每个选题的核心切入点\n3. 预计的读者共鸣点\n4. 难度评级（简单/中等/困难）\n5. 推荐优先级排序",
                        "内容日历规划": "请帮我规划内容日历：\n- 领域：{{field}}\n- 目标读者：{{audience}}\n- 发布频率：{{frequency}}\n- 平台：{{platform}}\n- 下期重点：{{hot_topic}}\n\n要求：\n1. 一周7天内容安排\n2. 每天一个主要主题\n3. 含1-2个热点/时效性选题\n4. 含互动/粉丝参与内容",
                        "用户痛点调研": "请帮我分析用户痛点：\n- 目标用户：{{audience}}\n- 所属领域：{{field}}\n- 已有产品/服务：{{existing_product}}\n\n请分析：\n1. 目标用户的TOP10痛点\n2. 每个痛点的紧急程度（高/中/低）\n3. 每个痛点的普遍性（高/中/低）\n4. 针对每个痛点的内容切入点\n5. 竞品在这些痛点上的覆盖情况"
                    }
                },
                "翻译润色": {
                    color: "teal",
                    variants: ["技术文档翻译", "文案润色", "标题优化"],
                    fields: [
                        { key: "source_text", label: "原文内容", placeholder: "粘贴需要翻译/润色的文本", required: true },
                        { key: "target_language", label: "目标语言", placeholder: "如：中文/英文/日文", required: false },
                        { key: "style", label: "目标风格", placeholder: "如：简洁/生动/专业/正式", required: true },
                        { key: "audience", label: "目标读者", placeholder: "如：普通读者/专业人士", required: false },
                        { key: "platform2", label: "发布平台", placeholder: "如：公众号/知乎/小红书", required: false },
                        { key: "optimization_direction", label: "优化方向", placeholder: "如：更吸引/更专业/更简洁", required: false },
                        { key: "glossary", label: "是否需要术语对照", placeholder: "是/否", required: false }
                    ],
                    prompts: {
                        "技术文档翻译": "请翻译以下技术文档：\n- 原文：{{source_text}}\n- 目标语言：{{target_language}}\n- 术语表：{{glossary}}\n\n要求：\n1. 保持专业术语准确\n2. 符合目标语言表达习惯\n3. 保留代码块不变\n4. 风格：{{style}}",
                        "文案润色": "请润色以下文案：\n- 原文案：{{source_text}}\n- 目标风格：{{style}}\n- 目标读者：{{audience}}\n\n要求：\n1. 提升表达流畅度\n2. 增强感染力\n3. 保持原意不变",
                        "标题优化": "请优化以下标题：\n- 原标题：{{source_text}}\n- 优化方向：{{optimization_direction}}\n- 平台：{{platform2}}\n\n要求：\n1. 提供3个优化版本\n2. 解释每个版本的优化思路"
                    }
                },
                "文案创意": {
                    color: "pink",
                    variants: ["营销文案生成", "社交媒体文案", "品牌故事脚本"],
                    fields: [
                        { key: "product", label: "产品/服务名称", placeholder: "如：XX在线写作工具", required: true },
                        { key: "audience", label: "目标用户画像", placeholder: "如：内容创作者、自媒体人", required: true },
                        { key: "selling_points", label: "核心卖点（1-3个）", placeholder: "如：AI辅助写作、一键排版", required: true },
                        { key: "channel", label: "营销渠道", placeholder: "如：公众号/小红书/抖音", required: false },
                        { key: "style", label: "文案风格", placeholder: "如：走心/硬核/幽默", required: false },
                        { key: "CTA", label: "行动号召", placeholder: "如：点击/购买/关注/收藏", required: false },
                        { key: "platform2", label: "发布平台", placeholder: "如：小红书/抖音/微博/知乎", required: false },
                        { key: "goal", label: "文案目标", placeholder: "如：涨粉/互动/转化/品牌曝光", required: true },
                        { key: "brand_name", label: "品牌名称", placeholder: "品牌名", required: false },
                        { key: "founding_time", label: "创立时间", placeholder: "如：2023年", required: false },
                        { key: "core_values", label: "核心价值/价值观", placeholder: "如：高效、创新", required: false }
                    ],
                    prompts: {
                        "营销文案生成": "请生成营销文案：\n- 产品/服务：{{product}}\n- 目标用户：{{audience}}\n- 核心卖点：{{selling_points}}\n- 营销渠道：{{channel}}\n- 文案风格：{{style}}\n- 行动号召：{{CTA}}\n\n输出要求：\n1. 一个吸引眼球的标题（3个备选）\n2. 开篇钩子（50字内）\n3. 正文结构（300-500字）\n4. 行动号召文案\n5. 备选配图建议",
                        "社交媒体文案": "请生成社交媒体文案：\n- 内容主题：{{product}}\n- 发布平台：{{platform2}}\n- 目标：{{goal}}\n- 目标用户：{{audience}}\n\n要求：\n1. 适配平台调性\n2. 含话题标签建议\n3. 含互动引导问题\n4. 字数符合平台最佳实践\n5. 提供3个不同角度版本",
                        "品牌故事脚本": "请帮我写一个品牌故事：\n- 品牌名：{{brand_name}}\n- 创立时间：{{founding_time}}\n- 核心价值：{{core_values}}\n- 目标用户：{{audience}}\n- 核心卖点：{{selling_points}}\n\n故事结构：\n1. 创始人为什么要做这件事\n2. 遇到了什么困难\n3. 如何坚持下来的\n4. 现在的样子\n5. 未来的愿景\n\n请用讲故事的方式而不是罗列事实。"
                    }
                }
            }
        },
        "编程场景": {
            icon: "fa-code",
            color: "green",
            templates: {
                "代码生成": {
                    color: "emerald",
                    variants: ["快速生成函数", "API 接口生成", "类与接口定义", "错误处理模板"],
                    fields: [
                        { key: "language", label: "编程语言", placeholder: "如：TypeScript/Python/Go", required: true },
                        { key: "task", label: "功能描述", placeholder: "详细描述需要实现的功能", required: true },
                        { key: "constraints", label: "约束条件", placeholder: "如：安全/性能/兼容性要求", required: false },
                        { key: "examples", label: "输入输出示例", placeholder: "如：输入xxx返回xxx", required: false },
                        { key: "function_name", label: "函数名", placeholder: "如：validateEmail", required: false },
                        { key: "params", label: "参数列表", placeholder: "如：email: string", required: false },
                        { key: "return_type", label: "返回值类型", placeholder: "如：boolean/Promise<User>", required: false },
                        { key: "api_path", label: "API 路径", placeholder: "如：/api/users", required: false },
                        { key: "api_method", label: "HTTP 方法", placeholder: "如：GET/POST/PUT/DELETE", required: false },
                        { key: "auth", label: "认证方式", placeholder: "如：JWT/OAuth/API Key", required: false }
                    ],
                    prompts: {
                        "快速生成函数": "请生成一个函数，功能如下：\n- 函数名：{{function_name}}\n- 输入参数：{{params}}\n- 返回值类型：{{return_type}}\n- 功能描述：{{task}}\n- 编程语言：{{language}}\n\n要求：\n1. 添加类型注释\n2. 包含参数校验\n3. 添加单元测试示例\n4. 约束条件：{{constraints}}",
                        "API 接口生成": "请生成 REST API 接口：\n- 路径：{{api_path}}\n- 方法：{{api_method}}\n- 功能：{{task}}\n- 认证方式：{{auth}}\n- 编程语言：{{language}}\n\n返回格式：\n1. 成功响应示例\n2. 错误响应示例\n3. 参数说明\n4. 包含输入输出：{{examples}}",
                        "类与接口定义": "请定义一个类：\n- 类名：{{function_name}}\n- 属性：{{params}}\n- 方法：{{task}}\n- 继承：{{constraints}}\n- 编程语言：{{language}}\n\n要求：\n1. 使用 TypeScript\n2. 添加访问修饰符\n3. 实现必要的生命周期方法\n4. 提供使用示例：{{examples}}",
                        "错误处理模板": "请为以下代码添加错误处理：\n- 编程语言：{{language}}\n- 功能描述：{{task}}\n- 可能的错误：{{constraints}}\n- 输入输出示例：{{examples}}\n\n要求：\n1. 使用 try-catch\n2. 添加错误日志\n3. 返回友好的错误消息"
                    }
                },
                "代码调试": {
                    color: "yellow",
                    variants: ["Bug 定位", "错误日志分析", "性能问题排查", "单元测试生成"],
                    fields: [
                        { key: "code", label: "相关代码", placeholder: "粘贴需要调试的代码", required: true },
                        { key: "problem", label: "问题描述", placeholder: "描述 Bug 现象", required: true },
                        { key: "expected", label: "期望行为", placeholder: "应该发生什么", required: false },
                        { key: "actual", label: "实际行为", placeholder: "实际发生什么", required: false },
                        { key: "environment", label: "运行环境", placeholder: "如：Node 18 / Chrome 120", required: false },
                        { key: "log", label: "错误日志", placeholder: "粘贴错误日志", required: false },
                        { key: "time_cost", label: "耗时/时间窗口", placeholder: "如：500ms / 2024-01", required: false },
                        { key: "data_scale", label: "数据规模", placeholder: "如：10万行 / 2GB", required: false },
                        { key: "test_framework", label: "测试框架", placeholder: "如：Jest/Vitest/Mocha", required: false },
                        { key: "coverage", label: "测试覆盖", placeholder: "如：正常/异常/边界", required: false }
                    ],
                    prompts: {
                        "Bug 定位": "请帮我定位以下 Bug：\n- 问题描述：{{problem}}\n- 期望行为：{{expected}}\n- 实际行为：{{actual}}\n- 相关代码：{{code}}\n\n分析步骤：\n1. 列出可能的原因\n2. 标记可疑代码行\n3. 提出排查建议\n4. 运行环境：{{environment}}",
                        "错误日志分析": "请分析以下错误日志：\n- 日志内容：{{log}}\n- 环境：{{environment}}\n- 时间：{{time_cost}}\n- 相关代码：{{code}}\n\n要求：\n1. 解读错误类型\n2. 定位问题代码\n3. 提出修复方案",
                        "性能问题排查": "请分析性能问题：\n- 问题现象：{{problem}}\n- 运行时间：{{time_cost}}\n- 数据规模：{{data_scale}}\n- 相关代码：{{code}}\n\n要求：\n1. 定位性能瓶颈\n2. 分析时间复杂度\n3. 提出优化方案",
                        "单元测试生成": "请为以下函数生成单元测试：\n- 函数代码：{{code}}\n- 测试框架：{{test_framework}}\n- 测试覆盖：{{coverage}}\n- 功能描述：{{problem}}\n\n要求：\n1. 测试所有参数组合\n2. 包含边界值测试\n3. 测试异常情况"
                    }
                },
                "代码重构": {
                    color: "orange",

        data_type: ["时间序列数据", "分类数据", "多维度表格数据"],
        presentation_goal: ["强调上升趋势", "对比各品类表现", "展示分布情况"],
        audience_analysis: ["管理层", "技术团队", "产品团队", "客户"],
        key_metrics: ["DAU、转化率、留存率", "GMV、客单价、复购率", "响应时间、吞吐量、错误率"],
        report_length: ["100-200字", "200-500字", "一页PPT摘要"],
        baseline: ["平均响应时间200ms", "日活用户5万", "转化率3%"],
        anomaly: ["某天响应时间飙升到2秒", "某渠道转化率骤降至0.5%"],
        time_window: ["过去7天", "过去30天", "同比去年同期"],
        competitors: ["竞品A、竞品B、竞品C", "Notion、Obsidian、Roam"],
        time_range: ["过去3年", "近5年", "2020-2024"],
        research_focus: ["技术趋势", "政策变化", "消费行为", "竞争格局"],
        product_desc: ["AI驱动的个人知识管理工具", "企业级低代码开发平台"],
        target_users: ["SaaS企业CTO", "独立开发者", "知识工作者"],
        research_goal: ["验证市场假设", "发现用户痛点", "测量满意度"],
        position: ["前端工程师", "后端工程师", "产品经理", "数据分析师"],
        level: ["初级", "中级", "高级", "专家"],
        round: ["技术面", "系统设计", "行为面"],
        role_name: ["产品经理", "开发者", "创业者", "设计师"],
        project_bg: ["正在开发一个AI写作助手", "计划从0到1搭建电商平台"],
        problem_desc: ["如何设计可扩展的系统架构", "怎样提高用户留存率"],
        review_focus: ["安全性", "性能", "可维护性", "代码风格"],
        product_concept: ["AI驱动的个人知识库", "社交化学习平台"],
        core_features: ["笔记同步、AI问答、知识图谱", "课程管理、社区互动、数据分析"],
        topic: ["AI是否会取代人类工作", "996工作制是否合理", "该不该让小孩用手机"],
        my_stance: ["正方", "反方", "中立但有倾向"],
        opponent_stance: ["反方", "正方", "中立但有倾向"],
        goal_depth: ["澄清概念", "检验逻辑", "探索深度认知"],
        experts: ["经济学家、AI研究员、社会学家", "创业者、投资人、技术专家"],
        meeting_goal: ["形成策略建议", "输出可行方案", "识别关键风险"]
    };

    // ============================
    // 状态
    // ============================
    let state = {
        category: null,
        template: null,
        variant: null
    };

    // ============================
    // UI 渲染函数
    // ============================

    // 渲染分类按钮
    function renderCategories() {
        const container = document.getElementById("categories");
        container.innerHTML = "";
        Object.keys(data).forEach(cat => {
            const info = data[cat];
            const isActive = state.category === cat;
            const btn = document.createElement("button");
            btn.className = `px-4 py-2 rounded-lg border text-sm font-medium transition flex items-center gap-1.5 ${
                isActive
                    ? "bg-blue-500 text-white border-blue-500 shadow"
                    : "bg-white text-gray-600 border-gray-200 hover:border-blue-300 hover:text-blue-600"
            }`;
            btn.innerHTML = `<i class="fa ${info.icon}"></i> ${cat}`;
            btn.onclick = () => selectCategory(cat);
            container.appendChild(btn);
        });
    }

    // 渲染模板按钮
    function renderTemplates() {
        const container = document.getElementById("templates");
        container.innerHTML = "";
        if (!state.category) {
            container.innerHTML = '<p class="text-gray-400 text-sm">请先选择场景分类</p>';
            return;
        }
        const catData = data[state.category].templates;
        Object.keys(catData).forEach(tpl => {
            const info = catData[tpl];
            const isActive = state.template === tpl;
            const btn = document.createElement("button");
            btn.className = `px-4 py-2 rounded-lg border text-sm font-medium transition ${
                isActive
                    ? "bg-green-500 text-white border-green-500 shadow"
                    : "bg-white text-gray-600 border-gray-200 hover:border-green-300 hover:text-green-600"
            }`;
            btn.textContent = tpl;
            btn.onclick = () => selectTemplate(tpl);
            container.appendChild(btn);
        });
    }

    // 渲染变体（子模板）按钮
    function renderVariants() {
        const container = document.getElementById("variants");
        const section = document.getElementById("variantSection");
        container.innerHTML = "";
        if (!state.category || !state.template) {
            section.style.display = "none";
            return;
        }
        const tplData = data[state.category].templates[state.template];
        if (!tplData.variants || tplData.variants.length <= 1) {
            section.style.display = "none";
            if (tplData.variants && tplData.variants.length === 1) {
                state.variant = tplData.variants[0];
            }
            return;
        }
        section.style.display = "block";
        tplData.variants.forEach(v => {
            const isActive = state.variant === v;
            const btn = document.createElement("button");
            btn.className = `px-3 py-1.5 rounded-lg border text-xs font-medium transition ${
                isActive
                    ? "bg-yellow-500 text-white border-yellow-500 shadow"
                    : "bg-white text-gray-600 border-gray-200 hover:border-yellow-300 hover:text-yellow-600"
            }`;
            btn.textContent = v;
            btn.onclick = () => selectVariant(v);
            container.appendChild(btn);
        });
        // Auto-select first variant if none selected
        if (!state.variant || !tplData.variants.includes(state.variant)) {
            selectVariant(tplData.variants[0]);
        }
    }

    // 渲染输入字段
    function renderFields() {
        const section = document.getElementById("fieldsSection");
        const container = document.getElementById("fields");
        container.innerHTML = "";

        if (!state.category || !state.template) {
            section.style.display = "none";
            return;
        }

        const tplData = data[state.category].templates[state.template];
        section.style.display = "block";

        tplData.fields.forEach(f => {
            const div = document.createElement("div");
            const label = document.createElement("label");
            label.className = "block text-xs font-medium text-gray-600 mb-1";
            label.textContent = f.label + (f.required ? " *" : "");
            if (f.required) {
                label.innerHTML += ' <span class="text-red-500">*</span>';
            }

            const input = document.createElement("input");
            input.type = "text";
            input.id = "field_" + f.key;
            input.className = "w-full p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-300 outline-none";
            input.placeholder = f.placeholder || "";

            div.appendChild(label);
            div.appendChild(input);
            container.appendChild(div);
        });
    }

    // ============================
    // 选择处理
    // ============================
    function selectCategory(cat) {
        if (state.category === cat) {
            state.category = null;
            state.template = null;
            state.variant = null;
        } else {
            state.category = cat;
            state.template = null;
            state.variant = null;
        }
        renderCategories();
        renderTemplates();
        renderVariants();
        renderFields();
        updateStatus();
    }

    function selectTemplate(tpl) {
        if (state.template === tpl) {
            state.template = null;
            state.variant = null;
        } else {
            state.template = tpl;
            state.variant = null;
        }
        renderTemplates();
        renderVariants();
        renderFields();
        updateStatus();
    }

    function selectVariant(v) {
        state.variant = v;
        renderVariants();
        updateStatus();
    }

    // ============================
    // 生成提示词
    // ============================
    function generate() {
        if (!state.category || !state.template || !state.variant) {
            document.getElementById("output").textContent = "请先选择分类、模板和具体场景";
            return;
        }

        const tplData = data[state.category].templates[state.template];
        const promptTpl = tplData.prompts[state.variant];
        if (!promptTpl) {
            document.getElementById("output").textContent = "该场景暂未配置提示词模板";
            return;
        }

        let result = promptTpl;
        let missingFields = [];

        tplData.fields.forEach(f => {
            const input = document.getElementById("field_" + f.key);
            const val = input ? input.value.trim() : "";
            const placeholder = "{{" + f.key + "}}";

            if (val) {
                result = result.replace(new RegExp(escapeRegExp(placeholder), "g"), val);
            } else {
                result = result.replace(new RegExp(escapeRegExp(placeholder), "g"), "（请填写" + f.label + "）");
                if (f.required) {
                    missingFields.push(f.label);
                }
            }
        });

        // 清理未匹配的占位符
        result = result.replace(/\{\{.+?\}\}/g, "（请补充相关信息）");

        // 添加元信息
        const meta = `# ${state.category} / ${state.template} / ${state.variant}\n# 使用说明：将以下内容复制发送给 Claude\n\n`;
        result = meta + result;

        if (missingFields.length > 0) {
            result += `\n\n⚠️ 提示：以下必填字段未填写：${missingFields.join("、")}，建议补充完整以获得更精准的结果。`;
        }

        const output = document.getElementById("output");
        output.textContent = result;
        updateStatus("已生成，点击复制使用");
    }

    // ============================
    // 复制 & 清空
    // ============================
    function copyPrompt() {
        const text = document.getElementById("output").textContent;
        if (!text || text === "等待生成...") return;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById("copyBtn");
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fa fa-check"></i> 已复制';
            setTimeout(() => { btn.innerHTML = orig; }, 2000);
        }).catch(() => {
            alert("复制失败，请手动选择文本复制");
        });
    }

    function clearPrompt() {
        document.getElementById("output").textContent = "等待生成...";
        updateStatus();
    }

    // ============================
    // 随机模板
    // ============================
    function randomTemplate() {
        const cats = Object.keys(data);
        const cat = cats[Math.floor(Math.random() * cats.length)];
        const tpls = Object.keys(data[cat].templates);
        const tpl = tpls[Math.floor(Math.random() * tpls.length)];
        const tplData = data[cat].templates[tpl];
        const variants = tplData.variants;
        const variant = variants[Math.floor(Math.random() * variants.length)];

        state.category = cat;
        state.template = tpl;
        state.variant = variant;

        renderCategories();
        renderTemplates();
        renderVariants();

        // 填充示例值
        tplData.fields.forEach(f => {
            const input = document.getElementById("field_" + f.key);
            if (input) {
                const pool = sampleValues[f.key];
                if (pool && Array.isArray(pool)) {
                    input.value = pool[Math.floor(Math.random() * pool.length)];
                } else if (pool) {
                    input.value = pool;
                } else {
                    input.value = "示例" + f.label;
                }
            }
        });

        renderFields();
        updateStatus("已随机选择： " + cat + " / " + tpl + " / " + variant);
        generate();
    }

    // ============================
    // 工具函数
    // ============================
    function escapeRegExp(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function updateStatus(msg) {
        const el = document.getElementById("status");
        el.textContent = msg || "";
    }

    // ============================
    // 收藏模板功能（localStorage持久化）
    // ============================
    var FAV_KEY = 'prompt_builder_favorites';

    function getFavorites() {
        try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
    }

    function saveFavoritesFn(favs) {
        localStorage.setItem(FAV_KEY, JSON.stringify(favs));
    }

    function saveCurrentToFavorites() {
        var cat = state.category;
        var tpl = state.template;
        var variant = state.variant;
        var output = document.getElementById('output').textContent;
        if (!cat || !tpl || !variant || output === '等待生成...') {
            alert('请先生成提示词再收藏');
            return;
        }

        var favs = getFavorites();
        var existing = favs.findIndex(function(f) { return f.category === cat && f.template === tpl && f.variant === variant; });
        if (existing >= 0) {
            if (!confirm('该配置已收藏，是否更新？')) return;
            favs[existing] = { category: cat, template: tpl, variant: variant, prompt: output, savedAt: new Date().toLocaleString() };
        } else {
            favs.unshift({ category: cat, template: tpl, variant: variant, prompt: output, savedAt: new Date().toLocaleString() });
        }
        if (favs.length > 30) favs.pop();
        saveFavoritesFn(favs);
        renderFavorites();
        alert('已收藏');
    }

    function loadFavorite(fav) {
        state.category = fav.category;
        state.template = fav.template;
        state.variant = fav.variant;
        renderCategories();
        renderTemplates();
        renderVariants();
        renderFields();

        if (fav.prompt) {
            document.getElementById('output').textContent = fav.prompt;
            updateStatus('已加载收藏模板');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function removeFavorite(index) {
        var favs = getFavorites();
        favs.splice(index, 1);
        saveFavoritesFn(favs);
        renderFavorites();
    }

    function clearAllFavorites() {
        if (!confirm('确定清空所有收藏吗？')) return;
        saveFavoritesFn([]);
        renderFavorites();
    }

    function renderFavorites() {
        var container = document.getElementById('favoritesList');
        var favs = getFavorites();
        window.favs = favs;
        if (favs.length === 0) {
            container.innerHTML = '<div class="text-gray-400 text-sm text-center py-2">暂无收藏，生成后点击收藏保存常用模板</div>';
            return;
        }
        container.innerHTML = favs.map(function(f, i) {
            return '<div class="flex items-center justify-between p-3 bg-gray-50 rounded hover:bg-gray-100 border">' +
                '<div class="flex-1 min-w-0 cursor-pointer" onclick="loadFavorite(window.favs[' + i + '])">' +
                    '<div class="text-sm font-medium text-gray-700 truncate">' + f.category + ' / ' + f.template + ' / ' + f.variant + '</div>' +
                    '<div class="text-xs text-gray-400">' + f.savedAt + '</div>' +
                '</div>' +
                '<div class="flex gap-2 ml-2">' +
                    '<button onclick="loadFavorite(window.favs[' + i + '])" class="text-blue-500 hover:text-blue-700 text-sm px-2" title="加载"><i class="fa fa-upload"></i></button>' +
                    '<button onclick="removeFavorite(' + i + ')" class="text-red-400 hover:text-red-600 text-sm px-2" title="删除"><i class="fa fa-times"></i></button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    // ============================
    // 初始化
    // ============================
    renderCategories();
    renderTemplates();
    renderVariants();
    renderFields();
    renderFavorites();
    </script>
</body>
